<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务看板</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .stat-card h3 { margin: 0; font-size: 2rem; font-weight: 700; }
        .stat-card.overdue h3 { color: #dc3545; }
        .stat-card.warning h3 { color: #fd7e14; }
        .stat-card.active h3 { color: #0d6efd; }
        .stat-card.completed h3 { color: #198754; }
        
        .lane-card {
            background: white;
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .lane-header {
            padding: 15px 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .lane-header.overdue { background: #f8d7da; color: #842029; }
        .lane-header.warning { background: #fff3cd; color: #664d03; }
        .lane-header.active { background: #cfe2ff; color: #084298; }
        .lane-header.completed { background: #d1e7dd; color: #0f5132; }
        
        .task-item {
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }
        .task-item:hover { background: #f8f9fa; }
        .task-item:last-child { border-bottom: none; }
        
        .priority-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .priority-dot.high { background: #dc3545; }
        .priority-dot.medium { background: #fd7e14; }
        .priority-dot.low { background: #198754; }
        
        .urgency-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
        }
        .urgency-badge.overdue { background: #f8d7da; color: #842029; }
        .urgency-badge.warning { background: #fff3cd; color: #664d03; }
        .urgency-badge.normal { background: #e9ecef; color: #6c757d; }
        
        .filter-bar {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">任务看板</span>
            <div>
                <button class="btn btn-light btn-sm me-2" onclick="refreshData()">
                    <i class="bi bi-arrow-clockwise"></i> 刷新
                </button>
                <a href="/flow/templates/" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-gear"></i> 流程配置
                </a>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <!-- 统计卡片 -->
        <div class="row mb-4">
            <div class="col-md-3 col-6">
                <div class="stat-card overdue">
                    <h3 id="statOverdue">0</h3>
                    <div class="text-muted">已超时</div>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="stat-card warning">
                    <h3 id="statWarning">0</h3>
                    <div class="text-muted">即将超时</div>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="stat-card active">
                    <h3 id="statActive">0</h3>
                    <div class="text-muted">进行中</div>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="stat-card completed">
                    <h3 id="statCompleted">0</h3>
                    <div class="text-muted">已完成</div>
                </div>
            </div>
        </div>

        <!-- 筛选栏 -->
        <div class="filter-bar">
            <div class="row g-3">
                <div class="col-md-3">
                    <select class="form-select" id="filterProject" onchange="applyFilters()">
                        <option value="">全部项目</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="filterType" onchange="applyFilters()">
                        <option value="">全部类型</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <input type="text" class="form-control" id="searchKeyword" placeholder="搜索任务名称..." oninput="applyFilters()">
                </div>
                <div class="col-md-3">
                    <button class="btn btn-primary w-100" onclick="showCreateTaskModal()">
                        <i class="bi bi-plus"></i> 新建任务
                    </button>
                </div>
            </div>
        </div>

        <!-- 泳道看板 -->
        <div class="row" id="taskLanes">
            <div class="col-md-6">
                <div class="lane-card">
                    <div class="lane-header overdue">
                        <i class="bi bi-exclamation-triangle-fill"></i>
                        超时任务 (<span id="overdueCount">0</span>)
                    </div>
                    <div id="overdueTasks">
                        <div class="task-item text-muted text-center py-4">暂无超时任务</div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="lane-card">
                    <div class="lane-header warning">
                        <i class="bi bi-clock-fill"></i>
                        即将超时 (<span id="warningCount">0</span>)
                    </div>
                    <div id="warningTasks">
                        <div class="task-item text-muted text-center py-4">暂无即将超时任务</div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="lane-card">
                    <div class="lane-header active">
                        <i class="bi bi-play-circle-fill"></i>
                        进行中 (<span id="activeCount">0</span>)
                    </div>
                    <div id="activeTasks">
                        <div class="task-item text-muted text-center py-4">暂无进行中任务</div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="lane-card">
                    <div class="lane-header completed">
                        <i class="bi bi-check-circle-fill"></i>
                        已完成 (<span id="completedCount">0</span>)
                    </div>
                    <div id="completedTasks">
                        <div class="task-item text-muted text-center py-4">暂无已完成任务</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 新建任务Modal -->
    <div class="modal fade" id="createTaskModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">新建任务</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">任务名称 *</label>
                        <input type="text" class="form-control" id="taskName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">关联项目</label>
                        <select class="form-select" id="taskProject">
                            <option value="">无</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">任务类型</label>
                        <select class="form-select" id="taskType">
                            <option value="">无</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">负责人</label>
                        <input type="text" class="form-control" id="taskAssignee" placeholder="输入负责人姓名">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">截止日期</label>
                        <input type="date" class="form-control" id="taskDeadline">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">优先级</label>
                        <select class="form-select" id="taskPriority">
                            <option value="medium">中</option>
                            <option value="high">高</option>
                            <option value="low">低</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">描述</label>
                        <textarea class="form-control" id="taskDesc" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="createTask()">创建</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = '/api/v1/tasks';
        let allTasks = [];
        let createTaskModal;

        document.addEventListener('DOMContentLoaded', function() {
            createTaskModal = new bootstrap.Modal(document.getElementById('createTaskModal'));
            loadData();
        });

        function getAuthHeaders() {
            const token = localStorage.getItem('auth_token');
            return token ? { 'Authorization': 'Token ' + token } : {};
        }

        async function loadData() {
            try {
                const [tasksResp, projectsResp, typesResp] = await Promise.all([
                    fetch(API_BASE + '/', { headers: getAuthHeaders() }),
                    fetch('/api/v1/projects/', { headers: getAuthHeaders() }),
                    fetch(API_BASE + '/flow/types/', { headers: getAuthHeaders() })
                ]);

                const tasksData = await tasksResp.json();
                const projectsData = await projectsResp.json();
                const typesData = await typesResp.json();

                allTasks = tasksData.results || tasksData;
                const projects = projectsData.results || projectsData;
                const types = typesData.results || typesData;

                populateFilters(projects, types);
                updateStats();
                renderTasks();
            } catch (e) {
                console.error(e);
            }
        }

        function populateFilters(projects, types) {
            const projectSelect = document.getElementById('taskProject');
            projectSelect.innerHTML = '<option value="">无</option>' + 
                projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');

            const filterProject = document.getElementById('filterProject');
            filterProject.innerHTML = '<option value="">全部项目</option>' + 
                projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');

            const typeSelect = document.getElementById('taskType');
            typeSelect.innerHTML = '<option value="">无</option>' + 
                types.map(t => `<option value="${t.id}">${t.name}</option>`).join('');

            const filterType = document.getElementById('filterType');
            filterType.innerHTML = '<option value="">全部类型</option>' + 
                types.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
        }

        function updateStats() {
            const now = new Date();
            let overdue = 0, warning = 0, active = 0, completed = 0;

            allTasks.forEach(task => {
                if (task.status === 'completed') {
                    completed++;
                } else if (task.status === 'in_progress' || task.status === 'pending') {
                    if (task.deadline) {
                        const deadline = new Date(task.deadline);
                        const hoursLeft = (deadline - now) / (1000 * 60 * 60);
                        if (hoursLeft < 0) overdue++;
                        else if (hoursLeft < 24) warning++;
                        else active++;
                    } else {
                        active++;
                    }
                }
            });

            document.getElementById('statOverdue').textContent = overdue;
            document.getElementById('statWarning').textContent = warning;
            document.getElementById('statActive').textContent = active;
            document.getElementById('statCompleted').textContent = completed;

            document.getElementById('overdueCount').textContent = overdue;
            document.getElementById('warningCount').textContent = warning;
            document.getElementById('activeCount').textContent = active;
            document.getElementById('completedCount').textContent = completed;
        }

        function applyFilters() {
            renderTasks();
        }

        function renderTasks() {
            const projectId = document.getElementById('filterProject').value;
            const typeId = document.getElementById('filterType').value;
            const keyword = document.getElementById('searchKeyword').value.toLowerCase();

            const now = new Date();
            let filtered = allTasks.filter(task => {
                if (projectId && task.project != projectId) return false;
                if (typeId && task.task_type != typeId) return false;
                if (keyword && !task.name.toLowerCase().includes(keyword)) return false;
                return true;
            });

            const overdue = [], warning = [], active = [], completed = [];
            
            filtered.forEach(task => {
                if (task.status === 'completed') {
                    completed.push(task);
                } else if (task.status === 'in_progress' || task.status === 'pending') {
                    if (task.deadline) {
                        const deadline = new Date(task.deadline);
                        const hoursLeft = (deadline - now) / (1000 * 60 * 60);
                        if (hoursLeft < 0) overdue.push({...task, urgency: 'overdue'});
                        else if (hoursLeft < 24) warning.push({...task, urgency: 'warning'});
                        else active.push({...task, urgency: 'normal'});
                    } else {
                        active.push({...task, urgency: 'normal'});
                    }
                }
            });

            renderLane('overdueTasks', overdue);
            renderLane('warningTasks', warning);
            renderLane('activeTasks', active);
            renderLane('completedTasks', completed);
        }

        function renderLane(elementId, tasks) {
            const container = document.getElementById(elementId);
            if (tasks.length === 0) {
                container.innerHTML = '<div class="task-item text-muted text-center py-4">暂无任务</div>';
                return;
            }
            
            container.innerHTML = tasks.map(task => `
                <div class="task-item" onclick="openTask('${task.id}')">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <div>
                            <span class="priority-dot ${task.priority}"></span>
                            <strong>${task.name}</strong>
                        </div>
                        ${task.urgency ? `<span class="urgency-badge ${task.urgency}">
                            ${task.urgency === 'overdue' ? '<i class="bi bi-exclamation-circle"></i> 超时' : 
                              task.urgency === 'warning' ? '<i class="bi bi-clock"></i> 即将超时' : ''}
                        </span>` : ''}
                    </div>
                    <div class="row text-muted small">
                        <div class="col-4">${task.project_name || '-'}</div>
                        <div class="col-4">${task.current_stage_name || '-'}</div>
                        <div class="col-4 text-end">${task.manager_display || '-'}</div>
                    </div>
                    ${task.deadline ? `<div class="text-muted small mt-1"><i class="bi bi-calendar"></i> ${task.deadline}</div>` : ''}
                </div>
            `).join('');
        }

        function openTask(taskId) {
            window.location.href = '/flow/task/?id=' + taskId;
        }

        function showCreateTaskModal() {
            document.getElementById('taskName').value = '';
            document.getElementById('taskDesc').value = '';
            document.getElementById('taskAssignee').value = '';
            document.getElementById('taskDeadline').value = '';
            document.getElementById('taskPriority').value = 'medium';
            createTaskModal.show();
        }

        async function createTask() {
            const name = document.getElementById('taskName').value.trim();
            if (!name) {
                alert('请输入任务名称');
                return;
            }

            const payload = {
                name,
                project: document.getElementById('taskProject').value || null,
                task_type: document.getElementById('taskType').value || null,
                assignee: document.getElementById('taskAssignee').value || null,
                deadline: document.getElementById('taskDeadline').value || null,
                priority: document.getElementById('taskPriority').value,
                description: document.getElementById('taskDesc').value
            };

            try {
                const resp = await fetch(API_BASE + '/', {
                    method: 'POST',
                    headers: Object.assign({ 'Content-Type': 'application/json' }, getAuthHeaders()),
                    body: JSON.stringify(payload)
                });

                if (!resp.ok) throw new Error('创建失败');
                
                createTaskModal.hide();
                loadData();
            } catch (e) {
                alert(e.message);
            }
        }

        function refreshData() {
            loadData();
        }
    </script>
</body>
</html>
