<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理登录 - 工程管理系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .login-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h1 {
            color: #1a1a2e;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .login-header p {
            color: #6c757d;
            font-size: 0.9rem;
            margin: 0;
        }
        .form-control {
            border-radius: 8px;
            padding: 12px 16px;
            border: 1.5px solid #e0e4e8;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-weight: 600;
            color: #fff;
            width: 100%;
        }
        .btn-login:hover {
            opacity: 0.9;
            color: #fff;
        }
        .errorlist {
            color: #dc3545;
            list-style: none;
            padding: 0;
            margin: 0 0 10px 0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h1><i class="bi bi-shield-lock me-2"></i>工程管理系统</h1>
            <p>后台管理登录</p>
        </div>
        
        {% if form.errors %}
            <div class="alert alert-danger">
                <i class="bi bi-exclamation-triangle me-2"></i>
                用户名或密码错误，请重试。
            </div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            
            <div class="mb-3">
                <label class="form-label">密码</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            
            <div class="mb-3 form-check">
                <input type="checkbox" name="remember_me" class="form-check-input" id="remember-me">
                <label class="form-check-label" for="remember-me">记住登录状态</label>
            </div>
            
            <button type="submit" class="btn btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i>登录
            </button>
            
            <input type="hidden" name="next" value="{{ next }}">
        </form>
    </div>
</body>
</html>
