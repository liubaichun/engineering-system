<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>施工人员管理 - 工程管理系统</title>
    <link href="/static/local/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/local/css/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --color-primary: #0d6efd;
            --sidebar-bg: #1a1a2e;
            --sidebar-hover: #16213e;
            --sidebar-text: #b8bcd4;
            --sidebar-width: 240px;
            --page-bg: #f0f2f5;
            --card-radius: 12px;
            --card-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--page-bg); overflow-x: hidden; }
        nav.sidebar { position: fixed; top: 0; left: 0; width: var(--sidebar-width); height: 100vh; background: var(--sidebar-bg); z-index: 100; overflow-y: auto; display: flex; flex-direction: column; }
        .sidebar-brand { padding: 16px 20px; color: #fff; font-size: 1rem; font-weight: 700; border-bottom: 1px solid #2a2a4a; margin-bottom: 8px; }
        nav.sidebar .nav { flex: 1; }
        nav.sidebar .nav-link { color: var(--sidebar-text); padding: 10px 16px; border-radius: 8px; margin: 2px 8px; font-size: 0.9rem; display: flex; align-items: center; text-decoration: none; transition: all 0.2s ease; }
        nav.sidebar .nav-link:hover { background: var(--sidebar-hover); color: #fff; }
        nav.sidebar .nav-link.active { background: var(--sidebar-hover); color: #fff; }
        nav.sidebar .nav-link i { width: 20px; margin-right: 8px; }
        nav.sidebar .mt-auto { border-top: 1px solid #2a2a4a; padding: 12px; }
        .offcanvas .nav-link { color: var(--sidebar-text); padding: 10px 16px; border-radius: 8px; margin: 2px 8px; font-size: 0.9rem; display: flex; align-items: center; text-decoration: none; }
        .offcanvas .nav-link:hover { background: var(--sidebar-hover); color: #fff; }
        .offcanvas .nav-link i { width: 20px; margin-right: 8px; }
        .offcanvas .mt-auto { border-top: 1px solid #2a2a4a; padding: 12px; }
        .main-content { margin-left: var(--sidebar-width); padding: 24px; min-height: 100vh; }
        @media (max-width: 767.98px) { .main-content { margin-left: 0 !important; padding: 12px; padding-top: 60px; } nav.sidebar { display: none; } }
        @media (min-width: 768px) and (max-width: 991.98px) { .main-content { margin-left: 0 !important; } nav.sidebar { display: none; } }
        @media (min-width: 992px) { .mobile-nav { display: none !important; } }
        .card { background: #fff; border: none; border-radius: var(--card-radius); box-shadow: var(--card-shadow); }
        .card-header { background: transparent; border-bottom: 1px solid #f0f0f0; padding: 16px 20px; font-weight: 600; }
        .stat-card { border-radius: var(--card-radius); padding: 20px; background: #fff; box-shadow: var(--card-shadow); }
        .stat-card .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .stat-card .stat-value { font-size: 1.5rem; font-weight: 700; }
        @media (max-width: 480px) { .stat-card .stat-value { font-size: 1.25rem; } }
        .stat-card .stat-label { color: #6c757d; font-size: 0.875rem; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .page-header h4 { margin: 0; font-weight: 700; }
        .table { margin-bottom: 0; }
        .table th { border-top: none; font-weight: 600; color: #495057; font-size: 0.875rem; }
        .table td { vertical-align: middle; font-size: 0.9rem; }
        .badge-work-type { background: #e7f1ff; color: #0d6efd; font-size: 0.75rem; padding: 4px 8px; border-radius: 6px; }
        #toast { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: none; padding: 12px 24px; background: rgba(0,0,0,0.8); color: #fff; border-radius: 8px; }
        .search-box { position: relative; max-width: 300px; }
        .search-box input { padding-left: 36px; border-radius: 8px; }
        .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #adb5bd; }
        .filter-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
        .filter-bar select, .filter-bar input { border-radius: 8px; }
        .qr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
        @media (max-width: 480px) { .qr-grid { grid-template-columns: 1fr; } }
        .qr-card { background: #fff; border-radius: 12px; box-shadow: var(--card-shadow); padding: 16px; }
        .qr-card .qr-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .qr-card .qr-project { font-weight: 600; }
        .qr-card .qr-code { background: #f8f9fa; border-radius: 8px; padding: 12px; text-align: center; font-family: monospace; font-size: 0.85rem; word-break: break-all; margin-bottom: 8px; }
        .qr-card .qr-time { font-size: 0.8rem; color: #6c757d; }
        .empty-state { text-align: center; padding: 60px 20px; color: #adb5bd; }
        .empty-state i { font-size: 3rem; margin-bottom: 16px; }
        .modal-header { background: var(--color-primary); color: #fff; }
        .modal-header .btn-close { filter: brightness(0) invert(1); }
    </style>
</head>
<body>
    <!-- Mobile Nav -->
    <nav class="mobile-nav navbar-dark bg-dark">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>
{% include "includes/fragment_sidebar.html" %}



    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <h4><i class="bi bi-people-fill me-2"></i>施工人员管理</h4>
            <div>
                <button class="btn btn-primary me-2" onclick="showWorkerModal()">
                    <i class="bi bi-plus-lg me-1"></i>添加人员
                </button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="stat-card">
                    <div style="display:flex;align-items:center;gap:12px;">
                        <div class="stat-icon" style="background:#e7f1ff;color:#0d6efd;"><i class="bi bi-people"></i></div>
                        <div><div class="stat-value" id="totalWorkers">0</div><div class="stat-label">总人数</div></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div style="display:flex;align-items:center;gap:12px;">
                        <div class="stat-icon" style="background:#e8f5e9;color:#198754;"><i class="bi bi-person-check"></i></div>
                        <div><div class="stat-value" id="activeWorkers">0</div><div class="stat-label">在职</div></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div style="display:flex;align-items:center;gap:12px;">
                        <div class="stat-icon" style="background:#fff3e0;color:#fd7e14;"><i class="bi bi-calendar-check"></i></div>
                        <div><div class="stat-value" id="todayCheckins">0</div><div class="stat-label">今日签到</div></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div style="display:flex;align-items:center;gap:12px;">
                        <div class="stat-icon" style="background:#f3e5f5;color:#6f42c1;"><i class="bi bi-qr-code"></i></div>
                        <div><div class="stat-value" id="totalQRCodes">0</div><div class="stat-label">有效二维码</div></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <ul class="nav nav-tabs mb-3" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#workers-tab" type="button"><i class="bi bi-people me-1"></i>人员列表</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#attendance-tab" type="button"><i class="bi bi-calendar-event me-1"></i>考勤记录</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#qr-tab" type="button"><i class="bi bi-qr-code me-1"></i>签到二维码</button></li>
        </ul>

        <div class="tab-content">
            <!-- Workers Tab -->
            <div class="tab-pane fade show active" id="workers-tab">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>施工人员列表</span>
                        <div class="search-box">
                            <i class="bi bi-search"></i>
                            <input type="text" class="form-control" placeholder="搜索姓名/手机/身份证..." id="workerSearch" oninput="filterWorkers()">
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead><tr><th>姓名</th><th>身份证号</th><th>手机号</th><th>工种</th><th>班组</th><th>状态</th><th>入场日期</th><th>操作</th></tr></thead>
                                <tbody id="workersTable"><tr><td colspan="8" class="text-center text-muted py-4">加载中...</td></tr></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Attendance Tab -->
            <div class="tab-pane fade" id="attendance-tab">
                <div class="card">
                    <div class="card-header"><span>考勤记录</span></div>
                    <div class="card-body">
                        <div class="filter-bar">
                            <select class="form-select" id="attProjectFilter" onchange="loadAttendance()"><option value="">全部项目</option></select>
                            <input type="date" class="form-control" id="attDateFrom" onchange="loadAttendance()" style="max-width:180px;">
                            <input type="date" class="form-control" id="attDateTo" onchange="loadAttendance()" style="max-width:180px;">
                        </div>
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead><tr><th>姓名</th><th>项目</th><th>班组</th><th>签到时间</th><th>签退时间</th><th>工作时长</th><th>状态</th></tr></thead>
                                <tbody id="attendanceTable"><tr><td colspan="7" class="text-center text-muted py-4">加载中...</td></tr></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- QR Tab -->
            <div class="tab-pane fade" id="qr-tab">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>签到二维码</span>
                        <button class="btn btn-primary btn-sm" onclick="showQRModal()"><i class="bi bi-plus-lg me-1"></i>生成二维码</button>
                    </div>
                    <div class="card-body">
                        <div class="filter-bar">
                            <select class="form-select" id="qrProjectFilter" onchange="loadQRCodes()" style="max-width:250px;"><option value="">全部项目</option></select>
                        </div>
                        <div class="qr-grid" id="qrGrid"><div class="empty-state"><i class="bi bi-qr-code"></i><p>暂无签到二维码</p></div></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Worker Modal -->
    <div class="modal fade" id="workerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="workerModalTitle">添加人员</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="workerId">
                    <div class="mb-3"><label class="form-label">姓名 <span class="text-danger">*</span></label><input type="text" class="form-control" id="workerName" required></div>
                    <div class="mb-3"><label class="form-label">身份证号 <span class="text-danger">*</span></label><input type="text" class="form-control" id="workerIdCard" maxlength="18" required></div>
                    <div class="mb-3"><label class="form-label">手机号 <span class="text-danger">*</span></label><input type="tel" class="form-control" id="workerPhone" maxlength="11" required></div>
                    <div class="mb-3"><label class="form-label">工种</label>
                        <select class="form-select" id="workerWorkType">
                            <option value="rebar">钢筋工</option><option value="carpenter">木工</option><option value="plumber">水电工</option>
                            <option value="electrician">电工</option><option value="painter">油漆工</option><option value="general">杂工</option>
                            <option value="driver">司机</option><option value="foreman">工长</option>
                        </select>
                    </div>
                    <div class="mb-3"><label class="form-label">技能等级</label>
                        <select class="form-select" id="workerSkillLevel"><option value="junior">初级</option><option value="intermediate">中级</option><option value="senior">高级</option></select>
                    </div>
                    <div class="mb-3"><label class="form-label">入场日期</label><input type="date" class="form-control" id="workerEntryDate"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveWorker()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- QR Modal -->
    <div class="modal fade" id="qrModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">生成签到二维码</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3"><label class="form-label">项目 <span class="text-danger">*</span></label><select class="form-select" id="qrProjectSelect" required><option value="">请选择项目</option></select></div>
                    <div class="mb-3"><label class="form-label">有效期（小时）</label><input type="number" class="form-control" id="qrValidHours" value="24" min="1" max="168"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="createQRCode()">生成</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast"></div>
    <script src="/static/local/js/bootstrap.bundle.min.js"></script>
    <script src="/static/local/js/qrcode.min.js"></script>
    <script>
        let workers = [], projects = [], allRecords = [];
        const token = localStorage.getItem('auth_token');

        function authHeaders() { return { 'Authorization': `Token ${token}` }; }
        function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }
        function logout() { localStorage.removeItem('auth_token'); window.location.href = '/login/'; }
        function getWorkTypeText(t) { const m={'rebar':'钢筋工','carpenter':'木工','plumber':'水电工','electrician':'电工','painter':'油漆工','general':'杂工','driver':'司机','foreman':'工长'}; return m[t]||t; }
        function getSkillText(s) { const m={'junior':'初级','intermediate':'中级','senior':'高级'}; return m[s]||s; }

        async function init() {
            if (!token) { window.location.href = '/login/'; return; }
            await loadProjects();
            await Promise.all([loadWorkers(), loadAttendance(), loadQRCodes()]);
        }

        async function loadProjects() {
            try {
                const resp = await fetch('/api/v1/projects/', { headers: authHeaders() });
                const data = await resp.json();
                projects = data.results || data || [];
                const opts = projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
                document.getElementById('attProjectFilter').innerHTML = '<option value="">全部项目</option>' + opts;
                document.getElementById('qrProjectFilter').innerHTML = '<option value="">全部项目</option>' + opts;
                document.getElementById('qrProjectSelect').innerHTML = '<option value="">请选择项目</option>' + opts;
            } catch (e) { console.error('loadProjects failed', e); }
        }

        async function loadWorkers() {
            try {
                const resp = await fetch('/api/v1/attendance/workers/', { headers: authHeaders() });
                const data = await resp.json();
                if (data.code === 0) {
                    workers = data.data;
                    renderWorkers();
                    document.getElementById('totalWorkers').textContent = workers.length;
                    document.getElementById('activeWorkers').textContent = workers.filter(w => w.status === 'active').length;
                }
            } catch (e) { console.error('loadWorkers failed', e); }
        }

        function renderWorkers(list) {
            const tbody = document.getElementById('workersTable');
            const data = list || workers;
            if (!data.length) { tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">暂无人员</td></tr>'; return; }
            tbody.innerHTML = data.map(w => `<tr>
                <td>${w.name}</td><td><code>${w.id_card_number}</code></td><td>${w.phone}</td>
                <td><span class="badge-work-type">${getWorkTypeText(w.work_type)}</span></td>
                <td>${w.group_name || '-'}</td>
                <td><span class="badge bg-${w.status==='active'?'success':'secondary'}">${w.status==='active'?'在职':'离职'}</span></td>
                <td>${w.entry_date || '-'}</td>
                <td><button class="btn btn-sm btn-outline-primary" onclick="editWorker(${w.worker_id})"><i class="bi bi-pencil"></i></button> <button class="btn btn-sm btn-outline-danger" onclick="deleteWorker(${w.worker_id})"><i class="bi bi-trash"></i></button></td>
            </tr>`).join('');
        }

        function filterWorkers() {
            const q = document.getElementById('workerSearch').value.toLowerCase();
            const filtered = workers.filter(w => w.name.toLowerCase().includes(q) || w.phone.includes(q) || w.id_card_number.includes(q));
            renderWorkers(filtered);
        }

        function showWorkerModal(id) {
            const modal = new bootstrap.Modal(document.getElementById('workerModal'));
            document.getElementById('workerModalTitle').textContent = id ? '编辑人员' : '添加人员';
            if (id) {
                const w = workers.find(x => x.worker_id === id);
                if (w) { document.getElementById('workerId').value = w.worker_id; document.getElementById('workerName').value = w.name; document.getElementById('workerIdCard').value = w.id_card_number; document.getElementById('workerPhone').value = w.phone; document.getElementById('workerWorkType').value = w.work_type||'general'; document.getElementById('workerSkillLevel').value = w.skill_level||'junior'; }
            } else { document.getElementById('workerId').value = ''; document.getElementById('workerName').value = ''; document.getElementById('workerIdCard').value = ''; document.getElementById('workerPhone').value = ''; document.getElementById('workerWorkType').value = 'general'; document.getElementById('workerSkillLevel').value = 'junior'; }
            modal.show();
        }
        const editWorker = showWorkerModal;

        async function saveWorker() {
            const id = document.getElementById('workerId').value;
            const name = document.getElementById('workerName').value.trim();
            const id_card = document.getElementById('workerIdCard').value.trim();
            const phone = document.getElementById('workerPhone').value.trim();
            const work_type = document.getElementById('workerWorkType').value;
            const skill_level = document.getElementById('workerSkillLevel').value;
            const entry_date = document.getElementById('workerEntryDate').value;
            if (!name || !id_card || !phone) { showToast('请填写必填项'); return; }
            try {
                const resp = await fetch('/api/v1/attendance/workers/create/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', ...authHeaders() },
                    body: JSON.stringify({ name, id_card_number: id_card, phone, work_type, skill_level, entry_date })
                });
                const data = await resp.json();
                if (data.code === 0) { showToast('保存成功'); bootstrap.Modal.getInstance(document.getElementById('workerModal')).hide(); loadWorkers(); }
                else { showToast(data.message || '保存失败'); }
            } catch (e) { showToast('网络错误'); }
        }

        async function deleteWorker(id) {
            if (!confirm('确定删除？')) return;
            try {
                const resp = await fetch('/api/v1/attendance/workers/' + id + '/', {
                    method: 'DELETE',
                    headers: authHeaders()
                });
                if (resp.ok) {
                    showToast('删除成功');
                    loadWorkers();
                } else {
                    const data = await resp.json();
                    showToast(data.message || '删除失败', 'error');
                }
            } catch (e) {
                showToast('网络错误', 'error');
            }
        }

        async function loadAttendance() {
            const projectId = document.getElementById('attProjectFilter').value;
            const dateFrom = document.getElementById('attDateFrom').value;
            const dateTo = document.getElementById('attDateTo').value;
            let params = new URLSearchParams();
            if (projectId) params.append('project_id', projectId);
            if (dateFrom) params.append('date_from', dateFrom);
            if (dateTo) params.append('date_to', dateTo);
            try {
                const resp = await fetch(`/api/v1/attendance/records/?${params}`, { headers: authHeaders() });
                const data = await resp.json();
                if (data.code === 0) {
                    allRecords = data.data;
                    renderAttendance();
                    const today = new Date().toISOString().slice(0,10);
                    const todayRecs = allRecords.filter(r => r.check_in_time && r.check_in_time.slice(0,10) === today);
                    document.getElementById('todayCheckins').textContent = todayRecs.length;
                }
            } catch (e) { console.error('loadAttendance failed', e); }
        }

        function renderAttendance() {
            const tbody = document.getElementById('attendanceTable');
            if (!allRecords.length) { tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">暂无记录</td></tr>'; return; }
            const sm = {'normal':['正常','success'],'late':['迟到','warning'],'early_leave':['早退','warning'],'absent':['缺勤','danger']};
            tbody.innerHTML = allRecords.map(r => { const [t,c]=sm[r.status]||['正常','success']; return `<tr><td>${r.worker_name}</td><td>${r.project_name}</td><td>${r.group_name||'-'}</td><td>${r.check_in_time?r.check_in_time.slice(0,16):'-'}</td><td>${r.check_out_time?r.check_out_time.slice(0,16):'-'}</td><td>${r.working_hours?r.working_hours+'h':'-'}</td><td><span class="badge bg-${c}">${t}</span></td><td><button class="btn btn-sm btn-outline-danger" onclick="deleteRecord(${r.record_id})"><i class="bi bi-trash"></i></button></td></tr>`; }).join('');
        }

        async function deleteRecord(id) {
            if (!confirm('确定删除该考勤记录？')) return;
            try {
                const resp = await fetch('/api/v1/attendance/records/' + id + '/', {
                    method: 'DELETE',
                    headers: authHeaders()
                });
                if (resp.ok) {
                    showToast('删除成功');
                    loadAttendance();
                } else {
                    const data = await resp.json();
                    showToast(data.message || '删除失败', 'error');
                }
            } catch (e) {
                showToast('网络错误', 'error');
            }
        }

        async function loadQRCodes() {
            const projectId = document.getElementById('qrProjectFilter').value;
            let url = '/api/v1/attendance/qrcodes/';
            if (projectId) url += `?project_id=${projectId}`;
            try {
                const resp = await fetch(url, { headers: authHeaders() });
                const data = await resp.json();
                if (data.code === 0) {
                    const now = new Date();
                    const valid = data.data.filter(q => new Date(q.valid_until) > now && !q.is_used);
                    document.getElementById('totalQRCodes').textContent = valid.length;
                    renderQRCodes(data.data);
                }
            } catch (e) { console.error('loadQRCodes failed', e); }
        }

        function renderQRCodes(qrcodes) {
            const grid = document.getElementById('qrGrid');
            if (!qrcodes.length) { grid.innerHTML = '<div class="empty-state"><i class="bi bi-qr-code"></i><p>暂无签到二维码</p></div>'; return; }
            const now = new Date();
            grid.innerHTML = qrcodes.map(q => {
                const expired = new Date(q.valid_until) <= now;
                const used = q.is_used;
                let status, cls;
                if (expired) { status='已过期'; cls='secondary'; }
                else if (used) { status='已使用'; cls='success'; }
                else { status='可用'; cls='primary'; }
                const signinUrl = `${window.location.origin}/signin/?qr_id=${q.qr_id}`;
                return `<div class="qr-card">
                    <div class="qr-header"><span class="qr-project">${q.project_name}</span><span class="badge bg-${cls}">${status}</span></div>
                    <div class="qr-code">${q.qr_id}</div>
                    <div class="qr-time">${q.valid_from?q.valid_from.slice(0,16):''} ~ ${q.valid_until?q.valid_until.slice(0,16):''}</div>
                    <div style="margin-top:12px;text-align:center;"><div id="qr-${q.id}" style="display:inline-block;"></div></div>
                    <div style="margin-top:8px;font-size:0.8rem;color:#6c757d;text-align:center;">扫码签到</div>
                </div>`;
            }).join('');
            // Generate QR codes
            qrcodes.forEach(q => {
                const signinUrl = `${window.location.origin}/signin/?qr_id=${q.qr_id}`;
                new QRCode(document.getElementById(`qr-${q.id}`), { text: signinUrl, width: 100, height: 100 });
            });
        }

        function showQRModal() {
            const modal = new bootstrap.Modal(document.getElementById('qrModal'));
            modal.show();
        }

        async function createQRCode() {
            const projectId = document.getElementById('qrProjectSelect').value;
            const validHours = document.getElementById('qrValidHours').value;
            if (!projectId) { showToast('请选择项目'); return; }
            try {
                const resp =                await fetch('/api/v1/attendance/qrcode/generate/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', ...authHeaders() },
                    body: JSON.stringify({ project_id: projectId, valid_hours: parseInt(validHours) || 24 })
                });
                const data = await resp.json();
                if (data.code === 0) { showToast('二维码生成成功'); bootstrap.Modal.getInstance(document.getElementById('qrModal')).hide(); loadQRCodes(); }
                else { showToast(data.message || '生成失败'); }
            } catch (e) { showToast('网络错误'); }
        }

        init();
    </script>
