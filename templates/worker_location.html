<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>施工人员定位 - 工程管理系统</title>
    <link href="/static/local/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/local/css/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --color-primary: #0d6efd;
            --color-primary-dark: #0b5ed7;
            --color-success: #198754;
            --color-warning: #ffc107;
            --color-danger: #dc3545;
            --sidebar-bg: #1a1a2e;
            --sidebar-hover: #16213e;
            --sidebar-text: #b8bcd4;
            --sidebar-width: 240px;
            --page-bg: #f0f2f5;
            --card-bg: #ffffff;
            --card-shadow: 0 2px 8px rgba(0,0,0,0.08);
            --card-radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--page-bg);
            overflow-x: hidden;
        }
        nav.sidebar {
            position: fixed; top: 0; left: 0; width: var(--sidebar-width);
            height: 100vh; background: var(--sidebar-bg); z-index: 100; overflow-y: auto;
            display: flex; flex-direction: column;
        }
        .sidebar-brand {
            padding: 16px 20px; color: #fff; font-size: 1rem; font-weight: 700;
            border-bottom: 1px solid #2a2a4a; margin-bottom: 8px;
        }
        nav.sidebar .nav { flex: 1; }
        nav.sidebar .nav-link {
            color: var(--sidebar-text); padding: 10px 16px; border-radius: 8px; margin: 2px 8px;
            font-size: 0.9rem; display: flex; align-items: center; text-decoration: none;
            transition: all 0.2s ease;
        }
        nav.sidebar .nav-link:hover { background: var(--sidebar-hover); color: #fff; }
        nav.sidebar .nav-link.active { background: var(--sidebar-hover); color: #fff; }
        nav.sidebar .nav-link i { width: 20px; margin-right: 8px; }
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 20px;
            min-height: 100vh;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .page-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #212529;
        }
        .card {
            background: var(--card-bg);
            border-radius: var(--card-radius);
            box-shadow: var(--card-shadow);
            border: none;
            margin-bottom: 20px;
        }
        .card-header {
            background: transparent;
            border-bottom: 1px solid #eee;
            padding: 16px 20px;
            font-weight: 600;
        }
        .card-body { padding: 20px; }
        
        /* 统计卡片 */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--card-bg);
            border-radius: var(--card-radius);
            padding: 20px;
            box-shadow: var(--card-shadow);
        }
        .stat-card .stat-icon {
            width: 48px; height: 48px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 12px;
        }
        .stat-card .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: #212529;
        }
        .stat-card .stat-label {
            color: #6c757d;
            font-size: 0.875rem;
        }
        .stat-icon.blue { background: #d0e8ff; color: #0d6efd; }
        .stat-icon.green { background: #e8f5e9; color: #198754; }
        .stat-icon.orange { background: #fff3e0; color: #fd7e14; }
        .stat-icon.purple { background: #f3e5f5; color: #6f42c1; }
        
        /* 地图容器 */
        .map-container {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
            height: calc(100vh - 280px);
            min-height: 500px;
        }
        .map-card {
            background: var(--card-bg);
            border-radius: var(--card-radius);
            box-shadow: var(--card-shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .map-card .card-header {
            flex-shrink: 0;
        }
        #map {
            flex: 1;
            min-height: 400px;
            touch-action: pan-x pan-y;
        }
        .worker-list-panel {
            background: var(--card-bg);
            border-radius: var(--card-radius);
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .worker-list-header {
            padding: 16px;
            border-bottom: 1px solid #eee;
            flex-shrink: 0;
        }
        .worker-list-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .worker-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #eee;
        }
        .worker-item:hover {
            background: #f8f9fa;
            border-color: var(--color-primary);
        }
        .worker-item.checked-out {
            opacity: 0.6;
        }
        .worker-item .worker-avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--color-primary);
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600;
            margin-right: 12px;
            flex-shrink: 0;
        }
        .worker-item .worker-info {
            flex: 1;
            min-width: 0;
        }
        .worker-item .worker-name {
            font-weight: 600;
            color: #212529;
            margin-bottom: 2px;
        }
        .worker-item .worker-meta {
            font-size: 0.8rem;
            color: #6c757d;
        }
        .worker-item .worker-status {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .status-working {
            background: #e8f5e9;
            color: #198754;
        }
        .status-checked-out {
            background: #f5f5f5;
            color: #6c757d;
        }
        .status-invalid {
            background: #ffebee;
            color: #dc3545;
        }
        
        /* 筛选器 */
        .filter-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-bar select, .filter-bar input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .filter-bar .btn {
            padding: 8px 16px;
            border-radius: 8px;
        }
        
        /* 自定义地图标记 */
        .custom-marker {
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .marker-working {
            width: 36px; height: 36px;
            border: 3px solid #198754;
        }
        .marker-checked-out {
            width: 36px; height: 36px;
            border: 3px solid #6c757d;
        }
        .marker-invalid {
            width: 36px; height: 36px;
            border: 3px solid #dc3545;
        }
        
        /* Leaflet popup 样式 */
        .leaflet-popup-content-wrapper {
            border-radius: 10px;
        }
        .popup-content {
            padding: 4px;
            min-width: 180px;
        }
        .popup-content h6 {
            margin: 0 0 8px 0;
            color: #212529;
            font-weight: 600;
        }
        .popup-content p {
            margin: 4px 0;
            font-size: 0.85rem;
            color: #6c757d;
        }
        .popup-content .badge {
            font-size: 0.75rem;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.3;
        }
        
        /* 加载状态 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: #6c757d;
        }
        .loading::after {
            content: '';
            width: 24px; height: 24px;
            border: 3px solid #ddd;
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 12px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 992px) {
            .map-container {
                grid-template-columns: 1fr;
                height: auto;
            }
            #map { min-height: 400px; }
            .worker-list-panel { max-height: 400px; }
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <nav class="sidebar">
        <div class="sidebar-brand">工程管理系统</div>
        <div class="nav">
            <a href="/dashboard/" class="nav-link">
                <i class="bi bi-speedometer2"></i>控制台
            </a>
            <a href="/projects/" class="nav-link">
                <i class="bi bi-folder"></i>项目管理
            </a>
            <a href="/tasks/" class="nav-link">
                <i class="bi bi-list-task"></i>任务管理
            </a>
            <a href="/workers/" class="nav-link">
                <i class="bi bi-people"></i>施工人员
            </a>
            <a href="/worker_location/" class="nav-link active">
                <i class="bi bi-geo-alt"></i>人员定位
            </a>
            <a href="/signin/" class="nav-link">
                <i class="bi bi-qr-code-scan"></i>签到入口
            </a>
            <a href="/finance/" class="nav-link">
                <i class="bi bi-wallet2"></i>财务管理
            </a>
            <a href="/stats/" class="nav-link">
                <i class="bi bi-bar-chart"></i>数据统计
            </a>
            <a href="/approval/" class="nav-link">
                <i class="bi bi-clipboard-check"></i>审批中心
            </a>
            <a href="/system/" class="nav-link">
                <i class="bi bi-gear"></i>系统设置
            </a>
        </div>
        <div class="mt-auto">
            <a href="/dashboard/" class="nav-link">
                <i class="bi bi-box-arrow-left"></i>返回首页
            </a>
        </div>
    </nav>
    
    <!-- 主内容 -->
    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">📍 施工人员定位</h1>
            <div class="filter-bar">
                <select id="projectFilter">
                    <option value="">全部项目</option>
                </select>
                <input type="date" id="dateFilter">
                <button class="btn btn-primary" onclick="loadWorkerLocations()">
                    <i class="bi bi-search"></i> 查询
                </button>
                <button class="btn btn-outline-secondary" onclick="refreshMap()">
                    <i class="bi bi-arrow-clockwise"></i> 刷新
                </button>
            </div>
        </div>
        
        <!-- 统计卡片 -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon blue">
                    <i class="bi bi-people"></i>
                </div>
                <div class="stat-value" id="totalWorkers">-</div>
                <div class="stat-label">考勤人数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green">
                    <i class="bi bi-person-check"></i>
                </div>
                <div class="stat-value" id="checkedInWorkers">-</div>
                <div class="stat-label">工作中</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange">
                    <i class="bi bi-person-dash"></i>
                </div>
                <div class="stat-value" id="checkedOutWorkers">-</div>
                <div class="stat-label">已签退</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon purple">
                    <i class="bi bi-exclamation-triangle"></i>
                </div>
                <div class="stat-value" id="invalidLocations">-</div>
                <div class="stat-label">位置异常</div>
            </div>
        </div>
        
        <!-- 地图和列表 -->
        <div class="map-container">
            <div class="map-card">
                <div class="card-header">
                    <i class="bi bi-map"></i> 工人位置分布
                </div>
                <div id="map">
                    <div class="loading">正在加载地图...</div>
                </div>
            </div>
            
            <div class="worker-list-panel">
                <div class="worker-list-header">
                    <strong>考勤人员列表</strong>
                    <span id="listCount" class="text-muted ms-2"></span>
                </div>
                <div class="worker-list-body" id="workerList">
                    <div class="loading">正在加载数据...</div>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 全局变量
        let map = null;
        let markers = {};
        let workerData = [];
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 设置默认日期为今天
            document.getElementById('dateFilter').value = new Date().toISOString().split('T')[0];
            
            // 初始化地图
            initMap();
            
            // 加载数据
            loadWorkerLocations();
        });
        
        // 初始化地图
        function initMap() {
            map = L.map('map').setView([31.2304, 121.4737], 13); // 默认上海
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
        }
        
        // 加载工人位置数据
        function loadWorkerLocations() {
            const projectId = document.getElementById('projectFilter').value;
            const date = document.getElementById('dateFilter').value;
            
            let url = '/api/v1/attendance/workers/locations/?';
            if (projectId) url += `project_id=${projectId}&`;
            if (date) url += `date=${date}&`;
            
            fetch(url, {
                headers: {
                    'Authorization': 'Token ' + getAuthToken(),
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(result => {
                if (result.code === 0) {
                    workerData = result.data;
                    updateStats(workerData);
                    updateProjectFilter(workerData.projects);
                    updateMap(workerData.workers);
                    updateWorkerList(workerData.workers);
                } else {
                    showError('加载数据失败: ' + result.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showError('网络错误，请稍后重试');
            });
        }
        
        // 获取Token
        function getAuthToken() {
            return localStorage.getItem('authToken') || '';
        }
        
        // 更新统计卡片
        function updateStats(data) {
            document.getElementById('totalWorkers').textContent = data.total_workers || 0;
            document.getElementById('checkedInWorkers').textContent = data.checked_in_count || 0;
            document.getElementById('checkedOutWorkers').textContent = data.checked_out_count || 0;
            
            const invalidCount = data.workers ? 
                data.workers.filter(w => !w.is_valid).length : 0;
            document.getElementById('invalidLocations').textContent = invalidCount;
        }
        
        // 更新项目筛选器
        function updateProjectFilter(projects) {
            const select = document.getElementById('projectFilter');
            const currentValue = select.value;
            
            // 保留"全部项目"选项
            select.innerHTML = '<option value="">全部项目</option>';
            
            projects.forEach(p => {
                const option = document.createElement('option');
                option.value = p.id;
                option.textContent = p.name;
                if (p.id == currentValue) option.selected = true;
                select.appendChild(option);
            });
        }
        
        // 更新地图
        function updateMap(workers) {
            // 清除旧标记
            Object.values(markers).forEach(marker => map.removeLayer(marker));
            markers = {};
            
            if (!workers || workers.length === 0) {
                document.getElementById('map').innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-geo-alt"></i>
                        <p>暂无定位数据</p>
                    </div>
                `;
                // 重新初始化地图容器
                setTimeout(() => {
                    if (!map) initMap();
                }, 100);
                return;
            }
            
            // 默认视图 - 如果有数据则定位到第一个工人位置
            if (workers.length > 0) {
                map.setView([workers[0].latitude, workers[0].longitude], 15);
            }
            
            workers.forEach(worker => {
                // 创建自定义图标
                const markerClass = worker.is_checked_out ? 'marker-checked-out' : 
                                   (!worker.is_valid ? 'marker-invalid' : 'marker-working');
                const statusColor = worker.is_checked_out ? '#6c757d' : 
                                    (!worker.is_valid ? '#dc3545' : '#198754');
                
                const icon = L.divIcon({
                    className: 'custom-marker',
                    html: `<div class="${markerClass}" style="display:flex;align-items:center;justify-content:center;">
                        <i class="bi bi-person-fill" style="color:${statusColor};font-size:16px;"></i>
                    </div>`,
                    iconSize: [36, 36],
                    iconAnchor: [18, 18]
                });
                
                // 创建弹出内容
                const popupContent = `
                    <div class="popup-content">
                        <h6>${worker.worker_name}</h6>
                        <p><i class="bi bi-telephone"></i> ${worker.worker_phone || '-'}</p>
                        <p><i class="bi bi-briefcase"></i> ${getWorkTypeName(worker.work_type)}</p>
                        <p><i class="bi bi-building"></i> ${worker.project_name}</p>
                        <p><i class="bi bi-clock"></i> 签到: ${formatTime(worker.check_in_time)}</p>
                        ${worker.check_out_time ? `<p><i class="bi bi-box-arrow-right"></i> 签退: ${formatTime(worker.check_out_time)}</p>` : ''}
                        <p class="mt-2">
                            <span class="badge ${worker.is_valid ? 'bg-success' : 'bg-danger'}">
                                ${worker.is_valid ? '位置有效' : '位置异常(' + worker.distance_meters + 'm)'}
                            </span>
                            <span class="badge ${worker.is_checked_out ? 'bg-secondary' : 'bg-success'}">
                                ${worker.is_checked_out ? '已签退' : '工作中'}
                            </span>
                        </p>
                    </div>
                `;
                
                const marker = L.marker([worker.latitude, worker.longitude], {icon: icon})
                    .bindPopup(popupContent)
                    .addTo(map);
                
                markers[worker.worker_id] = marker;
            });
        }
        
        // 更新工人列表
        function updateWorkerList(workers) {
            const container = document.getElementById('workerList');
            document.getElementById('listCount').textContent = `(${workers ? workers.length : 0})`;
            
            if (!workers || workers.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-people"></i>
                        <p>暂无考勤人员</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = workers.map(worker => `
                <div class="worker-item ${worker.is_checked_out ? 'checked-out' : ''}" 
                     onclick="focusWorker(${worker.worker_id})">
                    <div class="worker-avatar">${worker.worker_name.charAt(0)}</div>
                    <div class="worker-info">
                        <div class="worker-name">${worker.worker_name}</div>
                        <div class="worker-meta">
                            ${worker.project_name} · ${getWorkTypeName(worker.work_type)}
                        </div>
                        <div class="worker-meta">
                            签到: ${formatTime(worker.check_in_time)}
                            ${worker.distance_meters ? ' · 距工地' + worker.distance_meters + 'm' : ''}
                        </div>
                    </div>
                    <div>
                        ${worker.is_valid ? 
                            `<span class="worker-status status-working">工作中</span>` : 
                            `<span class="worker-status status-invalid">位置异常</span>`
                        }
                    </div>
                </div>
            `).join('');
        }
        
        // 聚焦到指定工人
        function focusWorker(workerId) {
            if (markers[workerId]) {
                const marker = markers[workerId];
                map.setView(marker.getLatLng(), 17);
                marker.openPopup();
            }
        }
        
        // 刷新地图
        function refreshMap() {
            loadWorkerLocations();
        }
        
        // 显示错误
        function showError(message) {
            document.getElementById('workerList').innerHTML = `
                <div class="empty-state">
                    <i class="bi bi-exclamation-triangle"></i>
                    <p>${message}</p>
                </div>
            `;
        }
        
        // 辅助函数
        function getWorkTypeName(code) {
            const types = {
                'rebar': '钢筋工',
                'carpenter': '木工',
                'plumber': '水电工',
                'electrician': '电工',
                'painter': '油漆工',
                'general': '杂工',
                'driver': '司机',
                'foreman': '工长'
            };
            return types[code] || code || '未知';
        }
        
        function formatTime(isoString) {
            if (!isoString) return '-';
            const date = new Date(isoString);
            return date.toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
        }
    </script>
</body>
</html>
