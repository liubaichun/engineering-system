<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 工程管理系统</title>
    <link href="/static/local/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/local/css/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --color-primary: #0d6efd;
            --sidebar-bg: #1a1a2e;
            --sidebar-hover: #16213e;
            --sidebar-text: #b8bcd4;
            --sidebar-width: 240px;
            --page-bg: #f0f2f5;
        }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--page-bg); }
        .sidebar { position: fixed; left: 0; top: 0; width: var(--sidebar-width); height: 100vh; background: var(--sidebar-bg); padding: 20px 0; overflow-y: auto; }
        .sidebar h4 { color: #fff; padding: 0 20px 20px; margin: 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar a { display: block; padding: 12px 20px; color: var(--sidebar-text); text-decoration: none; transition: all 0.2s; }
        .sidebar a:hover, .sidebar a.active { background: var(--sidebar-hover); color: #fff; }
        .main { margin-left: var(--sidebar-width); padding: 30px; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 24px; margin-bottom: 20px; }
        .page-title { font-size: 24px; font-weight: 600; margin-bottom: 24px; color: #333; }
        .user-table { width: 100%; border-collapse: collapse; }
        .user-table th, .user-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #eee; }
        .user-table th { background: #f8f9fa; font-weight: 600; color: #333; }
        .user-table tr:hover { background: #f8f9fa; }
        .role-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .role-admin { background: #dc3545; color: #fff; }
        .role-pm { background: #fd7e14; color: #fff; }
        .role-dev { background: #0d6efd; color: #fff; }
        .role-default { background: #6c757d; color: #fff; }
        .loading { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4>📊 工程管理系统</h4>
        <a href="/dashboard/">📈 控制台</a>
        <a href="/projects/">📁 项目管理</a>
        <a href="/users/" class="active">👥 用户管理</a>
        <a href="/pending_users/">✅ 用户审批</a>
        <a href="/system/">⚙️ 系统设置</a>
    </div>
    <div class="main">
        <h1 class="page-title">👥 用户管理</h1>
        <div class="card">
            <div id="loading" class="loading">加载中...</div>
            <table class="user-table" id="userTable" style="display:none;">
                <thead>
                    <tr>
                        <th>用户名</th>
                        <th>姓名</th>
                        <th>邮箱</th>
                        <th>角色</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="userList"></tbody>
            </table>
        </div>
    </div>
    <script>
        function getAuthHeaders() {
            var token = localStorage.getItem('auth_token');
            return token ? {'Authorization': 'Token ' + token} : {};
        }
        function getRoleBadge(role) {
            var badges = {
                'admin': '<span class="role-badge role-admin">管理员</span>',
                'pm': '<span class="role-badge role-pm">项目经理</span>',
                'dev': '<span class="role-badge role-dev">开发</span>'
            };
            return badges[role] || '<span class="role-badge role-default">' + role + '</span>';
        }
        fetch('/api/v1/users/', {headers: getAuthHeaders()})
            .then(function(r) { 
                if (r.status === 401 || r.status === 403) {
                    window.location.href = '/login/';
                    return [];
                }
                return r.json(); 
            })
            .then(function(users) {
                var list = document.getElementById('userList');
                document.getElementById('loading').style.display = 'none';
                document.getElementById('userTable').style.display = 'table';
                users.forEach(function(u) {
                    list.innerHTML += '<tr>' +
                        '<td>' + u.username + '</td>' +
                        '<td>' + (u.username || '-') + '</td>' +
                        '<td>' + (u.email || '-') + '</td>' +
                        '<td>' + getRoleBadge(u.role) + '</td>' +
                        '<td>' + (u.is_active ? '✅ 启用' : '❌ 禁用') + '</td>' +
                        '</tr>';
                });
                if (users.length === 0) {
                    list.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#999;">暂无数据</td></tr>';
                }
            })
            .catch(function() {
                document.getElementById('loading').textContent = '加载失败';
            });
    </script>
</body>
</html>
